appId: ${APP_ID}
---
- runFlow: ../../subflows/launch-fresh.yml
- swipe:
    start: 0%, 50%
    end: 60%, 50%
    label: 'Swipe from left edge to open drawer'
- extendedWaitUntil:
    visible:
      text: 'Preferences'
    timeout: 3000
    label: 'Wait for drawer animation, assert Preferences row visible'
