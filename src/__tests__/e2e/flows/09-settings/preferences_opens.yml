appId: ${APP_ID}
---
- runFlow: ../../subflows/launch-fresh.yml
- swipe:
    start: 0%, 50%
    end: 60%, 50%
    label: 'Open drawer'
- extendedWaitUntil:
    visible: 'Preferences'
    timeout: 10000
    label: 'Drawer opens with Preferences row'
- tapOn:
    text: 'Preferences'
    label: 'Tap Preferences'
- extendedWaitUntil:
    visible: 'Appearance'
    timeout: 10000
    label: 'Preferences screen renders with Appearance section'
